services:
  - type: web
    name: ai-festivals-platform
    runtime: node
    rootDir: api
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ai-festivals-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: false
        value: admin
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CALLMEBOT_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_ACTOR_ID
        sync: false

databases:
  - name: ai-festivals-db
    databaseName: ai_festivals
    user: ai_festivals_user
    plan: free
